name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t simple-web-app:${{ github.sha }} .

      - name: Save Docker image to tar
        run: |
          docker save simple-web-app:${{ github.sha }} -o app.tar

      - name: Copy tar to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "app.tar"
          target: "/root/"

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker load -i /root/app.tar
            docker stop web-app || true
            docker rm web-app || true
            docker run -d --name web-app -p 80:8080 simple-web-app:${{ github.sha }}
            rm -f /root/app.tar
