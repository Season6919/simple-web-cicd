name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t simple-web-app .

      - name: Save Docker image to tar
        run: |
          docker save simple-web-app -o app.tar

      - name: Copy tar to server via SSH
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > key.pem
          chmod 600 key.pem
          scp -o StrictHostKeyChecking=no -i key.pem app.tar root@${{ secrets.SERVER_HOST }}:/root/
          rm -f key.pem

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker load -i /root/app.tar
            docker stop web-app || true
            docker rm web-app || true
            docker run -d --name web-app -p 80:8080 simple-web-app
            rm -f /root/app.tar
